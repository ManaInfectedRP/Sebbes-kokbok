apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokboken-api
  namespace: kokboken
  labels:
    app: kokboken-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kokboken-api
  template:
    metadata:
      labels:
        app: kokboken-api
    spec:
      containers:
        - name: api
          image: kokboken-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
