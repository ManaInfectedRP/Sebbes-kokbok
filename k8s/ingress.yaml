apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kokboken-ingress
  namespace: kokboken
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: kokboken.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kokboken-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kokboken-api
                port:
                  number: 3001
